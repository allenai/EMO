# Math expert extension using training-data activations on finemath4+
#
# Base: moereducedp512sharedexp1 128-expert model (step 30995)
# Strategy: clone top-2 most-activated experts per training data, then train them

base_model:
  path: /weka/oe-training-default/ryanwang/phdbrainstorm/FlexMoE/models/moereducedp512sharedexp1_1b14b_lr-4e-3_lb-1e-1_0308/step30995
  # hf_path defaults to path + "-hf" if omitted

experts:
  num_new: 4
  num_shared: 1
  init_method: similar
  init_k: 2
  exclude_experts: [127]  # shared expert

data:
  mix: mj_finemath4plus

stage1:
  batch_size: 16
  seq_length: 4096
  max_tokens: 25000000  # 25M tokens
  cluster: ai2/jupiter-cirrascale-2
  gpus: 4

stage2:
  cluster: ai2/jupiter-cirrascale-2
  gpus: 1  # CPU-only work but need a node allocation

stage3:
  lr: 4e-4
  num_billion_tokens: 10
  warmup_fraction: 0.1
  lb_loss_weight: 1e-2
  cluster: ai2/jupiter
  gpus: 8
  nodes: 4

wandb:
  entity: allennlp
  project: flex2-extensions-kevinf
